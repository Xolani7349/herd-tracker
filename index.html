<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herd Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styling for the blurred image background */
        .bg-farm-blur {
            background-image: url('tizaWnPbIKmbRSr-800x450-noPad.jpg'); /* The file you uploaded in Step 1 */
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.7); /* Applied to background only */
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1; /* Puts background behind content */
        }
        /* Style the rounded menu card and options */
        .menu-card {
            background-color: rgba(255, 255, 255, 0.9); /* Slightly translucent white */
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="font-sans min-h-screen text-gray-800 antialiased">

    <!-- The fixed, blurred background layer -->
    <div class="bg-farm-blur"></div>

    <!-- Main Content Container -->
    <main class="container mx-auto p-4 max-w-5xl relative z-10">

        <!-- Navigation/Status Bar (as seen in image_1.png) -->
        <nav class="flex justify-between items-center bg-transparent py-4 text-white">
            <h1 class="text-xl font-semibold tracking-wide">Herd Net</h1>
            <div class="flex items-center gap-2">
                <span class="text-xs font-mono">11:44</span>
                <div class="w-6 h-6 rounded-full bg-green-500 border-2 border-white"></div> <!-- Online Status -->
            </div>
        </nav>

        <!-- Main Menu Section with Integrated Image -->
        <section class="menu-card p-6 rounded-3xl shadow-xl mb-6 relative overflow-hidden">
            <!-- Semi-transparent overlay holding the actual menu content -->
            <div class="absolute inset-0 bg-black/30 z-0"></div>
            
            <!-- Content overlaying the background-image -->
            <div class="relative z-10">
                <h2 class="text-3xl font-bold text-white mb-6 text-center">Main Menu</h2>
                
                <!-- Goats/Cows Option Toggles (image_1.png concept) -->
                <div class="grid grid-cols-2 gap-4">
                    <!-- Goat Option -->
                    <label class="flex items-center gap-4 bg-white/20 p-4 rounded-xl cursor-pointer border-2 border-transparent hover:border-white/50 transition">
                        <input type="radio" name="herdSelect" value="goats" class="w-6 h-6 accent-green-600">
                        <span class="text-5xl">🐐</span>
                        <span class="text-2xl font-semibold text-white">Goats</span>
                    </label>

                    <!-- Cow Option (Pre-selected in the design) -->
                    <label class="flex items-center gap-4 bg-white/20 p-4 rounded-xl cursor-pointer border-2 border-green-400/80 transition">
                        <input type="radio" name="herdSelect" value="cows" checked class="w-6 h-6 accent-green-600">
                        <span class="text-5xl">🐮</span>
                        <span class="text-2xl font-semibold text-white">Cows</span>
                    </label>
                </div>
            </div>
        </section>

        <!-- Dynamic Data Section (Displays results based on selection) -->
        <section id="data-display" class="bg-white rounded-3xl shadow-lg p-6 overflow-hidden">
            <div class="flex justify-between items-center mb-4 pb-2 border-b">
                <h3 id="herd-title" class="text-xl font-bold text-gray-700">Cows Herd - Morning Clock-In (July 5, 2026)</h3>
                <span class="text-sm bg-green-100 text-green-800 px-3 py-1 rounded-full font-medium">Synced Live</span>
            </div>

            <!-- The generated data table (filtered for Cows) -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="text-xs text-gray-500 uppercase tracking-wider bg-gray-50 border-b">
                        <tr>
                            <th class="p-4">Date</th>
                            <th class="p-4">Time</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Action</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-100">
                        <!-- Sample data (Cows) -->
                        <tr>
                            <td class="p-4 font-mono">2026-07-05</td>
                            <td class="p-4 font-mono">08:30 AM</td>
                            <td class="p-4 text-green-600 font-medium">✓ Present</td>
                            <td class="p-4"><button class="text-gray-400 hover:text-green-700">📄 Details</button></td>
                        </tr>
                        <tr>
                            <td class="p-4 font-mono">2026-07-05</td>
                            <td class="p-4 font-mono">08:31 AM</td>
                            <td class="p-4 text-green-600 font-medium">✓ Present</td>
                            <td class="p-4"><button class="text-gray-400 hover:text-green-700">📄 Details</button></td>
                        </tr>
                        <tr>
                            <td class="p-4 font-mono">2026-07-05</td>
                            <td class="p-4 font-mono">---</td>
                            <td class="p-4 text-red-600 font-bold">⚠️ Absent</td>
                            <td class="p-4"><button class="text-gray-400 hover:text-red-700">💬 Contact</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        // Placeholder for future database connection logic (e.g., Firebase)
        // This script will detect radio button changes and fetch the appropriate herd data.
        console.log("Interface Loaded. Waiting for database configuration.");
    </script>
</body>
</html>
